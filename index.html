<script>
  function getOS() {
    const userAgent = navigator.userAgent;
    if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) return "iOS";
    if (/android/i.test(userAgent)) return "Android";
    if (/Win/i.test(userAgent)) return "Windows";
    if (/Mac/i.test(userAgent)) return "macOS";
    return "unknown";
  }

  function redirectBasedOnOS() {
    const os = getOS();
    switch(os) {
      case "iOS":
        document.body.innerHTML = `
          <h1>Solve the following:</h1>
          <img src="math2.png" alt="">
          <form id="answerForm">
            <h1>Enter Answer:</h1>
            <p>Make you answer positive. Unscramble the answer.</p>
            <input type="text" id="answerInput" placeholder="Answer" />
            <button type="submit">Submit</button>
          </form>
        `;
        
        document.getElementById("answerForm").addEventListener("submit", function(e) {
          e.preventDefault();
          const userAnswer = document.getElementById("answerInput").value;
          console.log("User input:", userAnswer);
          // Add your validation logic here
          if (userAnswer === "i8π" || userAnswer === "I8π" ) {
            alert("Correct!");
            alert("Pin: 352");
          } else {
            alert("Try again.");
          }
        });
        break;
      case "Android":
        document.body.innerHTML = `
          <h1>Solve the following:</h1>
          <img src="math1.png" alt="">
          <form id="answerForm">
            <h1>Enter Answer:</h1>
            <p>Make you answer positive. Unscramble the answer.</p>
            <input type="text" id="answerInput" placeholder="Answer" />
            <button type="submit">Submit</button>
          </form>
        `;
        
        document.getElementById("answerForm").addEventListener("submit", function(e) {
          e.preventDefault();
          const userAnswer = document.getElementById("answerInput").value;
          console.log("User input:", userAnswer);
          // Add your validation logic here
          if (userAnswer === "i8π" || userAnswer === "I8π" ) {
            alert("Correct!");
            alert("Pin: 739");
          } else {
            alert("Try again.");
          }
        });
        
        break;
      case "Windows":
        window.location.href = "cheeese";
        break;
      case "macOS":
        document.body.innerHTML = `
          <h1>Solve the following:</h1>
          <img src="math1.png" alt="">

            <h1>Enter Answer:</h1>

          console.log("User input:", userAnswer);
          // Add your validation logic here
          if (userAnswer === "i8π" || userAnswer === "I8π" ) {
            alert("Correct!");
            alert("Pin: 739");
          } else {
            alert("Try again.");
          }
        });
        break;
      default:
        // Handle unknown OS
    }
  }

  window.onload = redirectBasedOnOS;
</script>
